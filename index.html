<div id="gameFrameOverlay">
  <button id="closeBtn">Close</button>
  <iframe id="gameFrame" src="about:blank"></iframe>
</div>

<script>
const overlay = document.getElementById("gameFrameOverlay");
const iframe = document.getElementById("gameFrame");
const closeBtn = document.getElementById("closeBtn");

// Example: your game HTML+JS as a string
const exampleGameHTML = `
  <!DOCTYPE html>
  <html>
  <head>
    <style>body{margin:0;background:black;}canvas{display:block;}</style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <script>
      const canvas=document.getElementById('gameCanvas');
      const ctx=canvas.getContext('2d');
      canvas.width=window.innerWidth;
      canvas.height=window.innerHeight;
      ctx.fillStyle='red';
      ctx.fillRect(100,100,200,200); // simple red box example
    </script>
  </body>
  </html>
`;

function openGame() {
  overlay.style.display="block";
  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write(exampleGameHTML);
  doc.close();
}

closeBtn.onclick = () => {
  overlay.style.display="none";
  iframe.src = "about:blank";
}

// Open the example game for demo
// openGame(); 
</script>
