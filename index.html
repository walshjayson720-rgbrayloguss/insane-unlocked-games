<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Hub</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0b0b0b;
  color:white;
  overflow-x:hidden;
}

/* GRID BACKGROUND */
#grid{
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(#1a1a1a 1px, transparent 1px),
    linear-gradient(90deg,#1a1a1a 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
  transition:0.1s;
}

/* HEADER */
header{
  text-align:center;
  font-size:32px;
  padding:20px;
}

/* SEARCH */
#search{
  display:block;
  margin:auto;
  margin-bottom:20px;
  padding:10px;
  width:300px;
  border-radius:6px;
  border:none;
  background:#111;
  color:white;
}

/* GAME GRID */
.games{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:30px;
}

.game{
  background:#111;
  padding:18px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.game:hover{
  transform:scale(1.15);
  filter:brightness(1.5);
  background:#222;
}

/* FULLSCREEN IFRAME */
#player{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background:black;
  flex-direction:column;
  z-index:10;
}

#player iframe{
  width:100%;
  height:100%;
  border:none;
}

/* CLOSE BUTTON BOTTOM LEFT */
#close{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:18px;
  padding:10px;
  background:#111;
  border-radius:6px;
  cursor:pointer;
  z-index:20;
}
</style>
</head>
<body>

<div id="grid"></div>

<header>Game Hub</header>

<input id="search" placeholder="Search games...">

<div class="games" id="games"></div>

<div id="player">
  <iframe id="gameFrame"></iframe>
  <div id="close">✕ Close</div>
</div>

<script>
/* 50+ GAMES WITH ACTUAL URLs */
const games=[
{name:"Eagkercraft",url:"https://eaglercraft.app/web/"},

{name:"BitLife",url:"https://bitlifeonline.io"}
];

/* RENDER GAMES */
const container=document.getElementById("games");
games.forEach(g=>{
  let div=document.createElement("div");
  div.className="game";
  div.innerText=g.name;
  div.onclick = ()=>{
    document.getElementById("player").style.display="flex";
    document.getElementById("gameFrame").src = g.url;
  };
  container.appendChild(div);
});

/* SEARCH FUNCTION */
document.getElementById("search").addEventListener("input", function(){
  let val=this.value.toLowerCase();
  document.querySelectorAll(".game").forEach(g=>{
    g.style.display=g.innerText.toLowerCase().includes(val)?"block":"none";
  });
});

/* CLOSE BUTTON */
document.getElementById("close").onclick=()=>{
  document.getElementById("player").style.display="none";
  document.getElementById("gameFrame").src="";
};

/* REACTIVE GRID */
document.addEventListener("mousemove", e=>{
  const grid=document.getElementById("grid");
  grid.style.backgroundPosition=(e.clientX/25)+"px "+(e.clientY/25)+"px";
});
</script>
</body>
</html>
