<!DOCTYPE html>
<html>
<head>
<title>Games</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    background-color:#0b0b0b;

    /* grid background */
    background-image:
    linear-gradient(#1a1a1a 1px, transparent 1px),
    linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
    background-size:40px 40px;

    text-align:center;
}

/* custom cursor */
body{
    cursor:crosshair;
}

h1{
    margin-top:40px;
    font-size:40px;
}

#search{
    margin-top:20px;
    padding:12px;
    width:300px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:16px;
    background:#111;
    color:white;
    box-shadow:0 0 10px rgba(255,255,255,0.1);
}

/* grid layout for games */
#gameList{
    margin:60px auto;
    width:90%;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:25px;
}

/* game cards */
.game{
    background:#111;
    padding:20px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
    border:1px solid transparent;
}

.game:hover{
    transform:scale(1.1);
    border:1px solid white;
    box-shadow:0 0 15px rgba(255,255,255,0.3);
}

/* fullscreen iframe overlay */
#gameFrameOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:9999;
}

#gameFrameOverlay iframe{
    width:100%;
    height:100%;
    border:none;
}

#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    padding:10px 20px;
    background:red;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border:none;
    border-radius:5px;
    z-index:10000;
}

</style>
</head>

<body>

<h1>Games</h1>

<input id="search" type="text" placeholder="Search games...">

<div id="gameList"></div>

<!-- Fullscreen game overlay -->
<div id="gameFrameOverlay">
    <button id="closeBtn">Close</button>
    <iframe id="gameFrame" src="about:blank"></iframe>
</div>

<script>

const games = [
{name:"Eaglercraft",url:"https://eaglercraft.app/web/"},
{name:"Bonk.IO",url:"https://bonk.io/"},
{name:"Hitbox.IO",url:"https://hitbox.io/"},
{name:"Google Snake",url:"https://google-snake-mods.pages.dev/v/current/"},
{name:"Slope",url:"https://slope-inf.vercel.app/"},
{name:"Bucket Smash",url:"https://gamea.azgame.io/bucket-smash/"},
{name:"Tap Road",url:"https://azgames.io/tap-road.embed"},
{name:"Ice Baby Quest",url:"https://gamea.azgame.io/ice-baby-quest/"},
// more games can go here
];

const list = document.getElementById("gameList");
const overlay = document.getElementById("gameFrameOverlay");
const iframe = document.getElementById("gameFrame");
const closeBtn = document.getElementById("closeBtn");

function renderGames(filter=""){
    list.innerHTML="";

    games
    .filter(game=>game.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach(game=>{

        const div=document.createElement("div");
        div.className="game";
        div.innerText=game.name;

        // open in embedded iframe instead of new tab
        div.onclick=()=>{
            iframe.src = game.url;
            overlay.style.display = "block";
        }

        list.appendChild(div);

    });
}

// close overlay
closeBtn.onclick = ()=>{
    overlay.style.display = "none";
    iframe.src = "about:blank";
}

renderGames();

document.getElementById("search").addEventListener("input",(e)=>{
    renderGames(e.target.value);
});

</script>

</body>
</html>
