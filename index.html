<!DOCTYPE html>
<html>
<head>
<title>Games</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    background-color:#0b0b0b;

    /* grid background */
    background-image:
    linear-gradient(#1a1a1a 1px, transparent 1px),
    linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
    background-size:40px 40px;

    text-align:center;
}

/* custom cursor */
body{
    cursor:crosshair;
}

h1{
    margin-top:40px;
    font-size:40px;
}

#search{
    margin-top:20px;
    padding:12px;
    width:300px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:16px;
    background:#111;
    color:white;
    box-shadow:0 0 10px rgba(255,255,255,0.1);
}

/* grid layout for games */
#gameList{
    margin:60px auto;
    width:90%;

    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:25px;
}

/* game cards */

.game{
    background:#111;
    padding:20px;
    border-radius:10px;
    cursor:pointer;

    transition:0.2s;

    border:1px solid transparent;
}

.game:hover{

    transform:scale(1.1);

    border:1px solid white;

    box-shadow:0 0 15px rgba(255,255,255,0.3);
}

</style>
</head>

<body>

<h1>Games</h1>

<input id="search" type="text" placeholder="Search games...">

<div id="gameList"></div>

<script>

const games = [
{name:"Eaglercraft",url:"https://eaglercraft.app/web/"},

const list = document.getElementById("gameList");

function renderGames(filter=""){
    list.innerHTML="";

    games
    .filter(game=>game.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach(game=>{

        const div=document.createElement("div");
        div.className="game";
        div.innerText=game.name;

        div.onclick=()=>window.open(game.url,"_blank");

        list.appendChild(div);

    });
}

renderGames();

document.getElementById("search").addEventListener("input",(e)=>{
    renderGames(e.target.value);
});

</script>
